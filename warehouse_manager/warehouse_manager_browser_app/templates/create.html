{% extends 'base.html' %}

{% block 'title %}Create a new product{% endblock %}

{% block 'content' %}
    {% if item == 'product' %}
        <a href= "{% url 'category_create' %}" class= 'link-btn'>New Category</a>
        <a href= "{% url 'localization_create' %}" class= 'link-btn'>New Localization</a>
    {% endif %}
    <form method='post'>{% csrf_token %}
        {{ form.as_p }}
        <input type='submit' value="Save">
    </form>
{% endblock %}
